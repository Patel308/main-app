name: CI/CD Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: pateldeepesh/scallar-app:latest

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }} # Or 'key: ${{ secrets.SSH_PRIVATE_KEY }}' if you used the key
          script: |
            # 1. Navigate to the app folder
            cd ~/scallar-app
            
            # 2. Pull the latest image
            docker pull pateldeepesh/scallar-app:latest
            
            # 3. Stop and remove the old container
            docker stop scallar-site || true
            docker rm scallar-site || true
            
            # 4. Run the new version
            docker run -d \
              --name scallar-site \
              -p 3000:3000 \
              --restart always \
              pateldeepesh/scallar-app:latest
              
            # 5. Clean up old images to keep the VM fast
            docker image prune -f