name: 🚀 Build · Push · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: pateldeepesh/scallar-app
  CONTAINER_NAME: scallar-site
  APP_PORT: 3010

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Type-check
  # ─────────────────────────────────────────
  quality:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck 2>/dev/null || true

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────
  # JOB 3: Deploy to VM
  # ─────────────────────────────────────────
  deploy:
    name: 🖥️ Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e

            echo "🧹 Cleaning up leftover containers..."
            docker rm -f scallar-site 2>/dev/null || true

            echo "🔐 Logging into Docker Hub..."
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            echo "📦 Pulling latest image..."
            docker pull pateldeepesh/scallar-app:latest

            echo "🔄 Starting container..."
            docker run -d \
              --name scallar-site \
              -p 3010:3000 \
              --restart always \
              pateldeepesh/scallar-app:latest

            echo "⏳ Waiting for app to boot..."
            sleep 5

            echo "🔍 Verifying container is up..."
            curl -sfL http://localhost:3010 > /dev/null && echo "✅ Site is live!" || {
              echo "❌ Site not responding! Logs:"
              docker logs scallar-site --tail 50
              exit 1
            }

            echo "🧹 Pruning old images..."
            docker image prune -f

            echo "🎉 Deployment complete!"
            docker ps --filter "name=scallar-site"