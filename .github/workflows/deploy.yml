name: CI/CD Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: pateldeepesh/scallar-app:latest

deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }} # Ensure this matches the secret name
          script: |
            cd ~/scallar-app
            docker pull pateldeepesh/scallar-app:latest
            docker stop scallar-site || true
            docker rm scallar-site || true
            docker run -d --name scallar-site -p 3000:3000 --restart always pateldeepesh/scallar-app:latest
            docker image prune -f