name: 🚀 Build · Push · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

env:
  DOCKER_IMAGE: pateldeepesh/scallar-app
  CONTAINER_NAME: scallar-site
  APP_PORT: 3000
  APP_DIR: ~/scallar-app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Type-check
  # ─────────────────────────────────────────
  quality:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck 2>/dev/null || true

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────
  # JOB 3: Deploy to VM
  # ─────────────────────────────────────────
  deploy:
    name: 🖥️ Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            echo "📦 Pulling latest image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "🔄 Swapping container (zero-downtime)..."
            # Start new container on temp port first to verify it boots
            docker run -d \
              --name ${{ env.CONTAINER_NAME }}_new \
              -p 3001:${{ env.APP_PORT }} \
              --restart always \
              ${{ env.DOCKER_IMAGE }}:latest

            # Give it 10s to boot
            sleep 10

            # Check new container is actually running
            if ! docker ps --filter "name=${{ env.CONTAINER_NAME }}_new" --filter "status=running" | grep -q ${{ env.CONTAINER_NAME }}_new; then
              echo "❌ New container failed to start, aborting!"
              docker logs ${{ env.CONTAINER_NAME }}_new --tail 50
              docker rm -f ${{ env.CONTAINER_NAME }}_new || true
              exit 1
            fi

            echo "✅ New container healthy, switching traffic..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Rename new → primary, re-bind to production port
            docker stop ${{ env.CONTAINER_NAME }}_new
            docker rm   ${{ env.CONTAINER_NAME }}_new

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              --restart always \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "🎉 Deployment complete! Container status:"
            docker ps --filter "name=${{ env.CONTAINER_NAME }}"